<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>A minha Aplicação Java Web</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; text-align: center; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        #resultado { margin-top: 20px; font-weight: bold; color: #28a745; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Sistema Escolar Java</h1>
        <p>Clique no botão para simular o processamento de dados do servidor.</p>
        <button id="btnProcessar">Processar Notas</button>
        <div id="resultado"></div>
    </div>

    <!-- Ligação ao ficheiro JavaScript que será ofuscado -->
    <script src="script.js"></script>
</body>
</html>
